# Trust X-Forwarded-For from Nginx Proxy Manager (which lives on the same docker network).
# Adjust the ranges to match the docker network where NPM runs.
RemoteIPHeader X-Forwarded-For
RemoteIPInternalProxy 172.16.0.0/12
RemoteIPInternalProxy 10.0.0.0/8
RemoteIPInternalProxy 192.168.0.0/16

# Log the real client IP, not the proxy
LogFormat "%a %l %u %t \"%r\" %>s %O \"%{Referer}i\" \"%{User-Agent}i\"" combined_real
