; GFOSS.it WordPress runtime tuning
upload_max_filesize = 32M
post_max_size       = 32M
memory_limit        = 256M
max_execution_time  = 120
max_input_vars      = 3000

; Mail (production sets these via SMTP plugin; in dev they go to mailpit)
sendmail_path       = /usr/sbin/sendmail -t -i

; Hardening
expose_php          = Off
allow_url_fopen     = On
allow_url_include   = Off

; Sessions / opcache
opcache.enable                  = 1
opcache.memory_consumption      = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files   = 10000
opcache.revalidate_freq         = 30
